<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MORPHEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#128737;</text></svg>">
</head>
<body>
<div id="app">

  <!-- Sidebar -->

        <path d="M50 5 L90 25 L87 65 Q85 90 50 105 Q15 90 13 65 L10 25 Z" stroke="#d4956a" stroke-width="4" fill="none" opacity="0.8"/>
        <ellipse cx="50" cy="55" rx="20" ry="12" stroke="#d4956a" stroke-width="3" fill="none"/>
        <circle cx="50" cy="55" r="5" fill="#d4956a" opacity="0.7"/>
      </svg>
      <span class="sidebar-logo-text">MORPHEX</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Overview</div>
        <a href="#/" class="nav-item" data-page="dashboard">

          <span>Dashboard</span>
        </a>
        <a href="#/metrics" class="nav-item" data-page="metrics">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
          <span>Metrics</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Scanning</div>
        <a href="#/scan" class="nav-item" data-page="scan">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>New Scan</span>
        </a>
        <a href="#/findings" class="nav-item" data-page="findings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>Findings</span>

        <a href="#/history" class="nav-item" data-page="history">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          <span>History</span>
        </a>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">System</div>
        <a href="#/settings" class="nav-item" data-page="settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          <span>Settings</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-version" id="version-display">MORPHEX v1.0.0</div>
      <div class="sidebar-status" id="status-dot">
        <span class="status-dot"></span>
        <span id="connection-status">Connecting...</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main id="main" class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="breadcrumb" id="breadcrumb">Dashboard</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-health" id="health-indicator" title="System health">
          <span class="health-dot"></span>
        </div>
      </div>
    </header>

    <div id="page-content" class="page-content">
      <!-- Pages rendered here by JS -->
      <div class="loading-skeleton">
        <div class="skeleton-line" style="width:40%"></div>
        <div class="skeleton-line" style="width:100%"></div>
        <div class="skeleton-line" style="width:80%"></div>
        <div class="skeleton-line" style="width:60%"></div>
      </div>
    </div>
  </main>

</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Modal Container -->
<div id="modal-backdrop" class="modal-backdrop hidden">
  <div id="modal" class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
    <div id="modal-actions" class="modal-actions"></div>
  </div>
</div>

<script src="/static/js/morphex.js?v=1773681913"></script>
</body>
</html>
