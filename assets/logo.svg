<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#999999" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#000000" />
  
  <!-- Outer Frame -->
  <rect x="64" y="64" width="384" height="384" fill="none" stroke="#333333" stroke-width="4" />
  
  <!-- Pixelated M / Scanner -->
  <g transform="translate(128, 156)">
    <!-- Left Column -->
    <rect x="0" y="0" width="48" height="200" fill="url(#grad)" />
    <!-- Right Column -->
    <rect x="208" y="0" width="48" height="200" fill="url(#grad)" />
    <!-- Diagonal Left -->
    <rect x="48" y="48" width="48" height="48" fill="#CCCCCC" />
    <rect x="80" y="96" width="48" height="48" fill="#AAAAAA" />
    <!-- Diagonal Right -->
    <rect x="160" y="48" width="48" height="48" fill="#CCCCCC" />
    <rect x="128" y="96" width="48" height="48" fill="#AAAAAA" />
    
    <!-- Active Scanner Pixel -->
    <rect x="104" y="144" width="48" height="48" fill="#FFFFFF" filter="url(#glow)" />
    <rect x="116" y="156" width="24" height="24" fill="#000000" />
  </g>
  
  <!-- Corner Accents -->
  <rect x="56" y="56" width="16" height="16" fill="#666666" />
  <rect x="440" y="56" width="16" height="16" fill="#666666" />
  <rect x="56" y="440" width="16" height="16" fill="#666666" />
  <rect x="440" y="440" width="16" height="16" fill="#666666" />
</svg>