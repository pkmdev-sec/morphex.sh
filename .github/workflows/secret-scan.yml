name: MORPHEX Secret Scan

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  morphex-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build MORPHEX
        run: |
          cd core && go build -o ../morphex ./cmd/morphex/

      - name: Generate scan API key
        id: key
        run: |
          KEY=$(./morphex generate-key --type scan 2>/dev/null | grep "Key:" | awk '{print $2}')
          echo "api_key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Run MORPHEX scan (JSON)
        id: scan
        env:
        run: |
          ./morphex scan \
            --json \
            --threshold 0.8 \
            --policy config/policies/strict-ci.json \
            --baseline .morphex-baseline.json \
            . > scan-results.json 2>&1 || true

          FINDINGS=$(cat scan-results.json | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(d.get('total_findings', 0))
          except:
              print(0)
          " 2>/dev/null || echo "0")

          echo "findings=$FINDINGS" >> "$GITHUB_OUTPUT"
          echo "::notice::MORPHEX found $FINDINGS potential secrets"

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morphex-scan-results
          path: scan-results.json

      - name: Run MORPHEX scan (SARIF for Code Scanning)
        if: always()
        env:
        run: |
          ./morphex scan \
            --sarif \
            --threshold 0.8 \
            --policy config/policies/strict-ci.json \
            --baseline .morphex-baseline.json \
            . > results.sarif 2>/dev/null || true

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: morphex-secret-scan

      - name: Fail if secrets found
        if: steps.scan.outputs.findings != '0'
        run: |
          echo "::error::MORPHEX detected ${{ steps.scan.outputs.findings }} secrets — blocking merge"
          exit 1

  trufflehog-comparison:
    name: TruffleHog Comparison
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true
