name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: make build
      - name: Test engine
        run: cd engine && go test ./...
      - name: Test core
        run: cd core && go test ./...
      - name: Verify binary
        run: ./morphex version

  benchmark:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build Morphex
        run: make build
      - name: Run benchmark
        run: make benchmark

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: golangci-lint (engine)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: engine
      - name: golangci-lint (core)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: core
